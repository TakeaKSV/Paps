<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formato de Cotización</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    h1 { margin-bottom: 1rem; }
    .section { margin-bottom: 2rem; }
    label { display: block; margin-top: 0.5rem; }
    input, textarea { width: 100%; padding: 0.5rem; margin-top: 0.3rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: center; }
    button { margin-top: 1rem; padding: 0.7rem 1.2rem; cursor: pointer; }
    .total-box { font-size: 1.2rem; margin-top: 1rem; font-weight: bold; }
    .print-btn { background:#000; color:#fff; border:none; border-radius:8px; }
    @media print {
      button, input, textarea { display: none !important; }
      body { margin: 0; }
    }
  </style>
</head>
<body>
  <div class="logo-container">
      <img id="logo" src="" alt="Logotipo" style="max-width:180px; display:block; margin-bottom:1rem;" />
    </div>
    <h1>Formato de Cotización</h1>  <div class="section">
    <h2>Datos del Cliente</h2>
    <label>Nombre del Cliente:</label>
    <input type="text" id="cliente" /><label>Dirección:</label>
<input type="text" id="direccion" />

<label>Correo:</label>
<input type="email" id="correo" />

<label>Descripción General:</label>
<textarea id="descripcion" rows="3"></textarea>

  </div>  <div class="section">
    <h2>Productos / Servicios</h2>
    <table id="tablaItems">
      <thead>
        <tr>
          <th>Descripción</th>
          <th>Cantidad</th>
          <th>Precio Unitario</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><input type="text" class="desc" /></td>
          <td><input type="number" class="cant" value="1" min="1" /></td>
          <td><input type="number" class="precio" value="0" step="0.01" /></td>
          <td class="resultado">0.00</td>
        </tr>
      </tbody>
    </table>
    <button onclick="agregarFila()">Agregar fila</button>
  </div>  <div class="section">
    <h2>Totales</h2>
    <label>Impuesto (%):</label>
    <input type="number" id="impuesto" value="16" step="0.1" /><button onclick="calcularTotales()">Calcular Cotización</button>

<div class="total-box" id="subtotalBox">Subtotal: $0.00</div>
<div class="total-box" id="impuestoBox">Impuesto: $0.00</div>
<div class="total-box" id="totalBox">Total: $0.00</div>

  </div>  <script>
    function agregarFila() {
      const tabla = document.querySelector('#tablaItems tbody');
      const fila = document.createElement('tr');
      fila.innerHTML = `
        <td><input type="text" class="desc" /></td>
        <td><input type="number" class="cant" value="1" min="1" /></td>
        <td><input type="number" class="precio" value="0" step="0.01" /></td>
        <td class="resultado">0.00</td>
      `;
      tabla.appendChild(fila);
    }

    function calcularTotales() {
      let subtotal = 0;
      const filas = document.querySelectorAll('#tablaItems tbody tr');

      filas.forEach(fila => {
        const cant = parseFloat(fila.querySelector('.cant').value) || 0;
        const precio = parseFloat(fila.querySelector('.precio').value) || 0;
        const total = cant * precio;
        fila.querySelector('.resultado').textContent = total.toFixed(2);
        subtotal += total;
      });

      const impuestoPorc = parseFloat(document.getElementById('impuesto').value) || 0;
      const impuestoCalc = subtotal * (impuestoPorc / 100);
      const totalFinal = subtotal + impuestoCalc;

      document.getElementById('subtotalBox').textContent = `Subtotal: $${subtotal.toFixed(2)}`;
      document.getElementById('impuestoBox').textContent = `Impuesto: $${impuestoCalc.toFixed(2)}`;
      document.getElementById('totalBox').textContent = `Total: $${totalFinal.toFixed(2)}`;
    }
  </script><button class="print-btn" onclick="window.print()">Imprimir Cotización</button>

</body>
</html>
